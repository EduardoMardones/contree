name: Release

# Se dispara al subir un tag que empiece con "v" (v1.0.0, v1.0.0-rust, etc.)
# y tambien se puede correr a mano desde la pestaña "Actions" en GitHub.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.platform }}${{ matrix.target && format(' / {0}', matrix.target) || '' }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            target: ""
          - platform: windows-latest
            target: ""
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache de Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Dependencias de sistema (solo Linux)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev \
            libssl-dev patchelf file

      - name: Instalar tauri-cli
        run: cargo install tauri-cli --version "^2.0.0" --locked

      - name: Compilar (sin target especifico)
        if: matrix.target == ''
        working-directory: .
        run: cargo tauri build

      - name: Compilar (macOS, target especifico)
        if: matrix.target != ''
        working-directory: .
        run: cargo tauri build --target ${{ matrix.target }}

      - name: Subir instaladores a la release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/appimage/*.AppImage
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/*/release/bundle/dmg/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
